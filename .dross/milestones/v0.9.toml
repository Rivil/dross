phases = ["ship-architecture-autogen", "secure-quality-findings-followups", "release-trust-and-distribution", "additional-board-backends", "verify-merge-before-completion", "pr-record-reaches-base", "homebrew-and-windows-distribution"]

[milestone]
  version = "v0.9"
  title = "Backlog burn-down: trust, findings & integrations"
  status = "active"
  started = "2026-07-01"

[scope]
  success_criteria = ["A repo with no ARCHITECTURE.md self-heals on its next dross ship: the backfill engine regenerates the doc and the phase's landmarks are merged in, with no manual /dross-architecture step.", "dross secure/quality findings are tracked across runs: each finding carries a status (new / recurring / resolved) comparable run-to-run, instead of every run being an isolated fresh report.", "A released dross binary ships with a signed checksum, and dross update verifies the signature before swapping the binary, refusing to apply the update on a mismatch.", "dross installs and self-updates on Windows (amd64/arm64) and is installable via a Homebrew tap, alongside the existing curl|sh + dross update path.", "dross board sync works end-to-end against a GitHub project board (issue sync and backlog sync), not only YouTrack, with a Jira backend available as a second provider."]
  non_goals = ["No deploy/CD pipeline or Claude Code hooks framework: distribution stops at signed artifacts + install channels (goreleaser, Homebrew tap, curl|sh).", "Not exhaustive scanner coverage: CodeQL is the only new scanner; broader per-language analyzer catalogs stay deferred to their existing slugs.", "Boards mirror, they don't master: board backends do issue + backlog sync only; dross stays the source of truth, with no board-driven mutation of dross state beyond sync."]
