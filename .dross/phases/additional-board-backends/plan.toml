[phase]
  id = "additional-board-backends"

[[task]]
  id = "t-1"
  wave = 1
  title = "Jira Cloud REST board backend (sibling BoardClient type)"
  files = ["internal/forge/jira.go", "internal/forge/jira_test.go"]
  description = """
New internal/forge/jira.go: a JiraClient struct + NewJira(cfg Config) constructor,
implementing all 6 BoardClient methods (forge.go:121-128) against the Jira Cloud REST API v3.
Model structure + the low-level `do` helper on youtrack.go (constructor ~46-67, do ~417-465).
- Auth: HTTP Basic email:token — email from cfg (a new AuthUser field, see t-3), token from
  os.Getenv(cfg.AuthEnv); error with a `dross env set` hint if unset (mirror youtrack.go:56-59).
- Endpoints (base cfg.APIBase = https://<site>.atlassian.net): CreateIssue POST /rest/api/3/issue
  (fields.project.key, summary, description, issuetype); GetIssue GET /rest/api/3/issue/{key};
  UpdateIssue PUT /rest/api/3/issue/{key}; CloseIssue = POST /rest/api/3/issue/{key}/transitions
  (transition to a Done status); ListIssues GET /rest/api/3/search?jql=... .
  Issue.Key is the Jira key string (PROJ-123); Number can stay 0.
- EnsureMilestone maps to a Jira project VERSION (POST /rest/api/3/version). Since ids are
  strings, add a concrete EnsureMilestoneEntity-style method + a SetState (transition) method
  like YouTrack, so the command layer's concrete-assertion path (t-3) can use it.
- var _ BoardClient = (*JiraClient)(nil).
Tests jira_test.go: copy newTestYTClient (youtrack_test.go:16-26) → newTestJiraClient (httptest
server, base-URL override, t.Setenv token). A constructor accept/reject table like
TestNewAcceptsYouTrack (:30). Per-method capture-and-assert tests (method/path/body → canned
JSON → parsed Issue) like TestYouTrackCreateIssue (:62), covering create/get/update/close(transition)/
list(JQL)/ensure-version. VERIFY the Jira REST v3 request/response shapes against the docs
(WebFetch developer.atlassian.com Jira Cloud REST v3) before coding — do not guess field names.
"""
  covers = ["c-2", "c-3"]
  test_contract = [
    "NewJira rejects missing apibase/authenv/unset-token and accepts a valid config (table test)",
    "CreateIssue posts fields.project.key+summary+description and parses the returned key; CloseIssue POSTs a transition; ListIssues issues a JQL search — each asserted against a mock handler",
    "EnsureMilestone(version) creates a Jira version and returns its string id via the concrete path",
  ]
  status = "todo"

[[task]]
  id = "t-2"
  wave = 1
  title = "GitHub board backend (repo issues + Projects v2 add-to-board)"
  files = ["internal/forge/github.go", "internal/forge/github_test.go"]
  description = """
New internal/forge/github.go: a GitHubClient struct + NewGitHubProjects(cfg Config) constructor
implementing BoardClient against GitHub's REST issues API (shaped like the forge Client:
issue-number string keys, integer repo milestones). Auth: token from os.Getenv(cfg.AuthEnv),
`Authorization: Bearer <tok>`, Accept application/vnd.github+json, base cfg.APIBase
(default https://api.github.com).
- CreateIssue POST /repos/{owner}/{repo}/issues (title, body, milestone int, labels); GetIssue
  GET .../issues/{number}; UpdateIssue PATCH; CloseIssue PATCH state=closed; ListIssues GET
  .../issues?state=&labels=; EnsureMilestone POST/GET .../milestones (returns the integer
  milestone number as a string id — fits the existing int-milestone path, unlike Jira).
- owner/repo come from cfg.Project (\"owner/repo\") — parse it; error if malformed.
- Projects v2 add-to-board: when a project board is configured (a new cfg field, see t-3, e.g.
  ProjectID = the Projects v2 node id or number), after CreateIssue call the GraphQL endpoint
  POST {APIBase}/graphql with mutation addProjectV2ItemById(projectId, contentId) — the issue's
  node id is returned by the REST create (field node_id). Keep this best-effort/isolated so a
  projectless config still syncs issues.
- var _ BoardClient = (*GitHubClient)(nil).
Tests github_test.go: newTestGitHubClient (httptest, base-URL override, token env). Constructor
table. Per-method REST capture-and-assert tests. A test that with a configured project, CreateIssue
ALSO fires the GraphQL addProjectV2ItemById mutation (mock the single /graphql POST, assert the
mutation body carries the project + content ids); and that WITHOUT a project, no GraphQL call is
made. VERIFY the GitHub REST issues + GraphQL Projects v2 addProjectV2ItemById shapes against the
docs (WebFetch docs.github.com REST issues + GraphQL Projects v2) before coding.
"""
  covers = ["c-1", "c-3"]
  test_contract = [
    "CreateIssue posts to /repos/{owner}/{repo}/issues and parses number+node_id; EnsureMilestone returns the integer milestone as a string id",
    "with a project configured, CreateIssue also POSTs an addProjectV2ItemById GraphQL mutation carrying the project + issue node ids; without a project, no /graphql call fires",
    "GetIssue/UpdateIssue/CloseIssue/ListIssues hit the right REST paths/verbs (mock-asserted)",
  ]
  status = "todo"

