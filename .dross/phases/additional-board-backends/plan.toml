  wave = 2
  title = "Wire github/jira into dispatch, config, and the issue command layer"
  files = ["internal/forge/forge.go", "internal/project/project.go", "internal/project/board_test.go", "internal/cmd/issue.go"]
  description = """
Registration + config + command wiring, keeping existing backends green.
