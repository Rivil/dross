- Run the full suite: existing forge/youtrack/issue tests must stay green.
"""
  covers = ["c-3"]
  test_contract = [
    "forge.NewBoard returns the GitHub client for provider=github and the Jira client for provider=jira",
    "a [board] block with the new fields (auth_user, github project) round-trips through Save→Load",
    "existing forgejo/gitea/gitlab/youtrack board tests and the dross issue command tests stay green",
  ]
  status = "todo"
