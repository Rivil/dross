  (the forge REST path); github board sync routes through NewBoard to the new client. Add any new
  fields to forge.Config (forge.go:54-62): AuthUser (jira email), and a project/board id for GH
  Projects (reuse ProjectID or add a BoardID field) — whatever the t-1/t-2 clients consumed.
- project.Board (project.go:113-121): add auth_user (jira email) and a github project/board number
  field. Extend the board_test.go round-trip (project/board_test.go:16-22) to cover the new fields.
- boardConfig (issue.go:104-116): map the new project.Board fields → forge.Config.
- issueEnable validation hints (issue.go:143-158): include github and jira in the provider list.
- Command-layer concrete assertions: alongside the existing `if yt, ok := ctx.client.(*forge.YouTrackClient)`
  branches at issue.go:232 (milestone), 344-349 (backlog), 454-458 (phase state), add branches for
  the Jira client (string-id entity/state path) — and GitHub if it needs any non-interface handling
