[phase]
  id = "status-action-surfaces"

[[task]]
  id = "t-1"
  wave = 1
  title = "Add action-area catalog + actions block renderer"
  files = ["internal/cmd/status.go", "internal/cmd/status_test.go"]
  description = "Define a fixed in-code catalog of action areas: security → /dross-secure,\nquality → /dross-quality, tech-debt → placeholder. All marked\nnot-yet-available in this phase. Add a pure render function for the\n`actions:` block: an available area emits its command line; an unavailable\narea emits a \"(planned)\" marker with no runnable command pointer.\n"
  covers = ["c-2"]
  test_contract = ["if an unavailable area renders a runnable command instead of the (planned) marker, the renderer test fails", "if an available area stops emitting its `/dross-…` command line, the renderer test fails"]
  status = "done"

[[task]]
  id = "t-2"
  wave = 2
  title = "Surface actions block when spine is idle"
  files = ["internal/cmd/status.go", "internal/cmd/status_test.go"]
  description = "Add a spine-idle predicate derived from the real spine state, NOT the\nfree-text CurrentPhaseStatus enum: idle == current_phase unset, OR\n(plan.NextRunnable() == nil AND no failed tasks AND verify verdict in\n{\"\", \"pass\"}) — the same signal suggestNext already uses for its terminal\n\"start a new phase or move on\" branch; factor it out and reuse it. When\nidle, print the `actions:` block above the `next:` line; otherwise suppress.\n"
  covers = ["c-1", "c-3"]
  depends_on = ["t-1"]
  test_contract = ["if the actions block is absent between phases (current_phase unset), the between-phases test fails", "if the actions block leaks into an active phase with a runnable task, the suppression test fails", "a phase whose verify.toml verdict is pass and whose plan has no runnable task shows the actions block — test fails if it's absent"]
  status = "done"
