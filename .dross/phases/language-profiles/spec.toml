[phase]
  id = "language-profiles"
  title = "language-profiles"
  milestone = "v0.2"

[[criteria]]
  id = "c-1"
  text = "Stack detection recognises Kotlin, Dart, Svelte, SQL, and TypeScript: the extLang map gains .dart/.svelte/.sql (.kt and .ts/.tsx already map), and a fixture repo for each resolves to the correct profile id while an unsupported (non-matching) repo does not false-match one of them."

[[criteria]]
  id = "c-2"
  text = "Five new profiles (kotlin, dart, svelte, sql, typescript) ship embedded via go:embed and surface through the CLI: each appears in 'dross stack list' and loads cleanly via 'dross stack show <id>'."

[[criteria]]
  id = "c-3"
  text = "AnalyzersFor(\"<id>\") surfaces each profile's dedicated analyzer (detekt / dcm / eslint+eslint-plugin-svelte / sqlfluff / eslint+typescript-eslint) on top of the agnostic set, each carrying a valid substantive dimension; ScannersFor(\"<id>\") returns only the agnostic scanner set (no dedicated security scanner is added)."

[[criteria]]
  id = "c-4"
  text = "The Kotlin, Dart, Svelte, and TypeScript profiles declare runtime commands (test/typecheck/format/build) appropriate to the stack, so init/onboard and 'dross stack apply' seed project.toml [runtime] from them; the SQL profile declares no runtime."

[[criteria]]
  id = "c-5"
  text = "Each new profile is proven by a test that detection resolves the right profile id AND AnalyzersFor surfaces its dedicated analyzer, with no mechanism-code change required beyond the named extLang additions — demonstrating the phase-07 extensibility keystone holds."

[[decisions]]
  key = "tool_loadout"
  choice = "Per-stack dedicated quality analyzers: Kotlin=detekt, Dart=dcm (Dart Code Metrics), Svelte=eslint+eslint-plugin-svelte, SQL=sqlfluff. All declared core; dimension=complexity for detekt/dcm/eslint, dimension=dead-code for sqlfluff."
  why = "Each is the de-facto substantive static analyzer for its ecosystem; the agnostic baseline (scc/jscpd/semgrep/gitleaks/trivy) covers everything else, so profiles add one strong dedicated analyzer rather than an exhaustive tool list (milestone non-goal)."
  locked = true

[[decisions]]
  key = "sqlfluff_dimension"
  choice = "sqlfluff is classified as an analyzer with dimension=dead-code (it flags unused CTEs/columns/aliases), not as a new dimension."
  why = "sqlfluff is a linter with no clean fit among the 6 substantive dimensions; adding a new dimension would be a mechanism-code change that breaks the 'adding a stack = zero code edits' keystone, so the closest existing dimension is used instead."
  locked = true

[[decisions]]
  key = "security_agnostic_only"
  choice = "No language-dedicated security scanners are added for any of the four stacks; security relies on the agnostic set (semgrep, gitleaks, trivy)."
  why = "No strong dedicated security scanner exists for these ecosystems beyond what agnostic semgrep/trivy already cover; adding overlapping scanners would add noise without coverage. The dedicated contribution is analyzer-side."
  locked = true

[[decisions]]
  key = "seed_runtime"
  choice = "Profiles declare runtime command sets: Kotlin via gradle (./gradlew test / compileKotlin / ktlintCheck / build), Dart via the dart toolchain (dart test / analyze / format / compile), Svelte via the JS toolchain (vitest / svelte-check / prettier / vite build). SQL declares no runtime."
  why = "Runtime seeding makes the profiles fully usable end-to-end (init/onboard/apply pick them up), consistent with the unified-profile decision from phase 07; SQL has no meaningful test/build runtime."
  locked = true

[[decisions]]
  key = "profile_id_equals_lang"
  choice = "Each profile's id equals its extLang language token (kotlin/dart/svelte/sql) so security/quality recon, which maps extensions to a language string via extLang, resolves the matching profile in ScannersFor/AnalyzersFor. extLang gains .dart->dart, .svelte->svelte, .sql->sql; .kt->kotlin already exists."
  why = "Profile selection is data-driven via [signals], but the audit-recon path keys catalogs off the extLang language token; the id must match that token or dedicated tools won't load even when detection succeeds."
  locked = true

[[decisions]]
  key = "typescript_profile"
  choice = "A fifth profile (id=typescript: eslint+typescript-eslint analyzer, dimension=complexity, JS runtime vitest/tsc/prettier/build) ships alongside the four, and the svelte profile lists .ts/.tsx in [signals].exts. extLang already maps .ts/.tsx->typescript."
  why = "Svelte work is TypeScript-intertwined, and audit recon (quality.BuildManifest) calls AnalyzersFor per detected language keyed on profile id == language token; without an id=typescript profile, .ts files in a Svelte (or any TS) repo would get only the agnostic analyzers, never the dedicated eslint. Approved inline during execute on 2026-06-21."
  locked = true

[[deferred]]
  text = "Language-dedicated security scanners per stack (e.g. eslint-plugin-security for Svelte)."
  why = "Agnostic semgrep/gitleaks/trivy cover these ecosystems for now; revisit only if a gap shows."

[[deferred]]
  text = "A new quality dimension for SQL/correctness linting."
  why = "Rejected to preserve the zero-mechanism-change keystone; sqlfluff maps to dead-code instead."
  dismissed = true

[[deferred]]
  text = "Broader per-ecosystem tool coverage (ktlint as a style analyzer, dart analyze as a separate analyzer, svelte-check as a quality tool, full Flutter build variants)."
  why = "First-cut loadout per stack only (milestone non-goal: not exhaustive per-language coverage)."

[[deferred]]
  text = "Marker-file stack detection (Dockerfile / compose) and a Docker profile."
  why = "Separate phase 09-marker-file-detection in this milestone."
  dismissed = true

[[deferred]]
  text = "Unifying the extLang map with each profile's [signals].exts so extension->language is single-sourced."
  why = "Not required to ship these profiles; the milestone explicitly scopes 'extLang additions' as the recognition path."
