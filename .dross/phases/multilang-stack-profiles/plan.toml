[phase]
id = "multilang-stack-profiles"

[[task]]
id            = "t-1"
wave          = 1
title         = "Author full profiles: python, javascript, csharp"
files         = [
  "internal/stack/profiles/python.toml",
  "internal/stack/profiles/javascript.toml",
  "internal/stack/profiles/csharp.toml",
  "internal/stack/detect_test.go",
  "internal/quality/recon_test.go",
]
description   = """
Three full drop-in profiles (signals + runtime + analyzer + loadout), mirroring go.toml/typescript.toml shape.
javascript id MUST be "javascript" (exts .js/.jsx), not "node". javascript's package.json signal must stay lower
priority than typescript so a tsconfig+.ts tree still resolves to typescript.
"""
covers        = ["c-1", "c-2"]
test_contract = [
  "If python.toml drops .py or its analyzer, Detect on a .py-only tree no longer returns \"python\" AND quality.BuildManifest omits the python analyzer (the c-1 analyzer-in-run row).",
  "If javascript.toml id is \"node\" instead of \"javascript\", the t-3 no-regression golden's .js row fails (language silently renamed).",
  "If javascript claims package.json at >= typescript's priority, Detect on a tsconfig.json + .ts tree returns \"javascript\" not \"typescript\" (TS-hijack guard).",
]
status        = "pending"

[[task]]
