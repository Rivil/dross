test_contract = [
  "With HOME set to a temp dir and a new .zzz profile dropped under the user overlay, stack.DetectLanguages on a .zzz tree includes that id AND quality.AnalyzersFor(id)/BuildManifest surfaces its analyzer — proving zero-Go-edit extensibility; reverting t-3's derivation breaks the DetectLanguages half.",
  "A malformed toml dropped beside the valid one does not crash: DetectLanguages still returns the embedded language set (never-crash drop-in seam).",
]
