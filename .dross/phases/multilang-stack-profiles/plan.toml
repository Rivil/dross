End-to-end keystone proving c-3 via the real user-overlay path. With t.Setenv("HOME", tmp) and a brand-new <id>.toml
(exts=[".zzz"], one analyzer) under ~/.claude/dross/profiles/, assert detectable + recon-visible with zero edits to
detect.go/recon.go/catalog.go.
"""
