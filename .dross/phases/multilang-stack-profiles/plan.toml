  "internal/stack/profiles/java.toml",
  "internal/stack/profiles/c.toml",
  "internal/stack/profiles/cpp.toml",
  "internal/stack/profiles/php.toml",
  "internal/stack/profiles/swift.toml",
  "internal/stack/profile_test.go",
  "internal/stack/detect_test.go",
]
description   = """
Seven detection-only stubs carrying only id + title + [signals].exts (per stub_profile_shape). c.toml keeps .c/.h,
cpp.toml keeps .cc/.cpp. Repair TestDetectUnsupportedFixture: shipping ruby.toml makes its foo.rb fixture legitimately
Detect "ruby" — swap that fixture to a genuinely-unmapped ext so the never-false-match guard stays meaningful.
"""
covers        = ["c-2"]
test_contract = [
  "A stub with only id+title+[signals].exts (no [runtime]/[[tools]]/[loadout]) Decodes and Validates clean — a Validate regression rejecting a bare stub fails TestStubMinimalShapeLoads.",
  "If any one stub is malformed (missing id, or a tools entry with no bin), Embedded() errors and the whole shipped set fails — TestEmbeddedProfilesAllLoad catches the blast radius.",
  "If c.toml drops .h or cpp.toml drops .cc, that ext's detect row loses \"c\"/\"cpp\" (multi-ext aliases the old map carried).",
  "After shipping ruby.toml, TestDetectUnsupportedFixture still asserts a never-matched stack on a genuinely-unmapped ext (fixture repaired in the same commit).",
]
status        = "pending"

[[task]]
id            = "t-3"
wave          = 2
depends_on    = ["t-1", "t-2"]
title         = "Single-source DetectLanguages; delete extLang"
files         = [
  "internal/stack/detect.go",
  "internal/stack/detect_test.go",
]
description   = """
Delete the hardcoded extLang map. Add an unexported parameterized core (detectLanguagesFrom(root, profiles) /
extLangFor(profiles)) that DetectLanguages(root) wraps via LoadAll() — public signature unchanged, so recon callers
stay untouched. Derive ext->lang by UNION over every loaded profile's [signals].exts (per the amended
ext_clash_resolution): a shared ext yields every claiming profile's language. Detect stays winner-take-all.
"""
covers        = ["c-2"]
test_contract = [
  "A temp tree with one file per legacy ext (.go .py .js .jsx .ts .tsx .rb .rs .java .kt .dart .svelte .sql .c .h .cc .cpp .cs .php .swift) yields all legacy language ids — TestDetectLanguagesNoRegression loses the exact language whose derivation broke.",
  "A pure-.ts repo's DetectLanguages still includes \"typescript\" — a winner-take-all derivation returns only \"svelte\" (pri 6 > 4) and fails TestTsNotHijackedBySvelte.",
  "The ext->lang core is unit-tested as a pure function over a profile slice (no filesystem); a tie-break/clash regression fails that unit without a temp dir.",
  "No extLang map literal survives in detect.go — TestNoDuplicateExtLangMap fails if one is reintroduced.",
]
status        = "pending"

