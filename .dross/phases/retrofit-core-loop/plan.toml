  wave = 4
  title = "Add prompt-sentinel tests for c-3/c-4"
  files = ["internal/cmd/interaction_coreloop_test.go"]
  description = "Extend the guard test with direct prompt assertions (anchored on stable strings,\nper plan-review) that graduate c-3/c-4 from weak to covered. c-3: slice ship.md\nby heading and require §2/§3/§6 to each hold exactly one AskUserQuestion keyed on\nstable anchors, plus §3 carries 'rather than silently writing config'. c-4:\nplan.md §5 holds the one-line confirm and the no-paste directive. (The review's\n'no [[task]] in §5' negative is dropped — §5 legitimately documents the schema\nwith [[task]]; the positive no-paste directive is the load-bearing guard.)\n"
  covers = ["c-3", "c-4"]
  depends_on = ["t-1", "t-4", "t-7"]
  test_contract = ["c-3: if ship.md's §2/§3/§6 sections don't each contain exactly one AskUserQuestion keyed on the anchors ('Use generated body, or write your own?' / 'Request reviewers' / 'Merge now?'), or §3 loses 'rather than silently writing config', the c-3 sentinel test fails", "c-4: if plan.md §5 loses 'Plan written: N tasks across W waves' or the 'Don't paste the toml back' directive, the c-4 sentinel test fails"]
  status = "done"
