[phase]
id        = "04-status-action-surfaces"
title     = "status-action-surfaces"
milestone = "v0.1"

[[criteria]]
id   = "c-1"
text = "When the spine is idle (no phase in progress, or the current phase is verified/complete with nothing left to do), `dross status` shows a non-spine action surface listing the security/quality/tech-debt areas — not just the single spine `next:` line."

[[criteria]]
id   = "c-2"
text = "Each surfaced area names the concrete command to act on it (e.g. `/dross-secure`), or a clear not-yet-available marker when no command exists yet — never a runnable pointer to a command that errors."

[[criteria]]
id   = "c-3"
text = "During an active phase (spec/plan/execute/verify pending, or fail/partial findings to address), the non-spine surface is suppressed and the spine `next:` remains the only suggestion."

[[decisions]]
key    = "area_catalog"
choice = "Fixed in-code catalog of action areas (security, quality, tech-debt) — no config schema."
why    = "YAGNI for a solo single-binary tool with no second consumer; stack profiles (phase 07) can extend it later if needed."
locked = true

[[decisions]]
key    = "dead_command_handling"
choice = "Areas whose backing command isn't built yet are shown with a 'planned'/not-yet-available marker and no runnable command; each later phase flips its area live."
why    = "Keeps the surface informative now and makes c-1 demonstrable at 04's ship (secure/quality come in 05/06), while never pointing at a command that errors."
locked = true

[[decisions]]
key    = "trigger_boundary"
choice = "Show the surface only when the spine is idle: current_phase unset, OR phase verified/pass/complete/shipped with no remaining spine action. Suppress while any spine step is pending."
why    = "Precise predicate for c-1 + c-3 — surfaces non-spine work exactly at the 'what now?' moment without cluttering live work."
locked = true

[[decisions]]
key    = "placement_format"
choice = "Render as a dedicated labeled block (e.g. `actions:`) near the `next:` line — one area per line with its command or marker; `next:` still points at starting a new phase."
why    = "Matches the existing pending:/handoff: block style and keeps the explicit start-new-phase pointer alongside the alternatives."
locked = true

[[deferred]]
text = "Signal-aware prioritization — ranking areas by staleness / never-run (the dropped c-5)."
why  = "Needs a signal source (last-run timestamps per area) that doesn't exist yet."

[[deferred]]
text = "Config-driven `[[action_areas]]` catalog in project.toml."
why  = "YAGNI for a solo tool; revisit if stack profiles (07) need per-stack areas."

[[deferred]]
text = "A real tech-debt scanner behind the tech-debt area."
why  = "Phase 04 ships tech-debt as a placeholder/planned area only; the scanner is its own capability."
