[phase]
  id = "retrofit-setup-commands"
  title = "retrofit-setup-commands"
  milestone = "v0.3"

[[criteria]]
  id = "c-1"
  text = "Each of the 7 setup/config prompts (init, onboard, options, rule, inbox, quick, milestone) invokes `dross interaction show` in its pre-flight and treats the playbook as MUST-FOLLOW; grep-verifiable that the invocation appears in all seven."

[[criteria]]
  id = "c-2"
  text = "Each of the 7 prompts references the propose-and-react interaction contract in its intro/conventions, so a reader sees the interaction style is binding (grep-verifiable phrase per prompt)."

[[criteria]]
  id = "c-3"
  text = "No interactive turn in the 7 prompts bundles multiple unrelated decisions into one AskUserQuestion — each setup decision is its own turn (e.g. options walks settings one at a time, not one mega-form)."

[[criteria]]
  id = "c-4"
  text = "No command pastes a composed internal config artifact (project.toml, milestone.toml, rules, options diffs) back wholesale for review — confirmation is a one-line summary, with specific fields surfaced only on request."

[[criteria]]
  id = "c-5"
  text = "The interaction-audit checklist gains a mapped entry for each of the 7 setup/config commands, listing its decision points and confirming the propose-and-react pattern holds."

[[decisions]]
  key = "options_walk"
  choice = "options opens with a section-pick gate (project / defaults / rules / profile / env), then walks each setting in the chosen section(s) one at a time — it does not force a turn for every setting on every run."
  why = "The settings list is large; per-setting-every-run would be a 15+ turn wall, while a section gate keeps it one-decision-per-turn for the area the user actually came to change."
  locked = true

[[decisions]]
  key = "retrofit_depth"
  choice = "Uniform restructure — every interactive turn across all 7 setup/config prompts is rewritten into a consistent propose-and-react shape, not only the turns that violate c-3/c-4. Reaffirms phase 11's retrofit_depth for this set."
  why = "A consistent feel across the whole command surface matters more than the churn risk of touching already-conforming flows."
  locked = true

[[decisions]]
  key = "quick_inbox_mirror"
  choice = "quick and inbox are retrofitted in full; where quick's pair-mode approval gates overlap execute's (retrofitted in phase 11), they reuse execute's existing propose-and-react shape verbatim rather than diverging."
  why = "quick's execution gates are the same decision points as execute's; mirroring the already-shipped pattern avoids drift between two near-identical flows."
  locked = true

[[decisions]]
  key = "milestone_walk"
  choice = "milestone sequences its scoping the way spec does — success criteria one at a time, then non-goals, then phase order, each as its own propose-and-react segment — not one freeform 'describe the milestone' dump."
  why = "Matches spec.md's established walk so the two scoping commands feel the same, and keeps each part steerable."
  locked = true

[[deferred]]
  text = "Retrofit of read-mostly commands (pause, resume, status)."
  why = "Out of the agreed 7-command setup/config set; revisit only if they grow interactive decision points."

[[deferred]]
  text = "Documenting the interaction model in the README as a first-class loop behaviour."
  why = "Milestone criterion 4 — 13-audit-and-readme's job."

[[deferred]]
  text = "Full audit-checklist sweep across all interactive commands."
  why = "Phase 13; here only the 7 setup/config commands get checklist entries."
