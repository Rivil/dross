[phase]
  id = "native-statusline"

[[task]]
  id = "t-1"
  wave = 1
  title = "Pure render core: line 1 + context meter + golden harness"
  files = ["internal/statusline/render.go", "internal/statusline/render_test.go", "internal/statusline/testdata"]
  description = "Cobra-free core mirroring internal/update. `Inputs` struct + `Render(Inputs) []byte`.\nLine 1 = dim model display_name │ dim basename(current_dir) ⎇ dim branch (branch\narrives in Inputs, empty -> no suffix). Context meter: 10 cells, USED %, auto-compact\nnormalization (CLAUDE_CODE_AUTO_COMPACT_WINDOW/total_tokens else ~16.5%), color bands\ngreen<50 / yellow<65 / orange<80 / blinking 💀 red >=80; absent when remaining nil.\nEstablishes the golden harness reused by t-2/t-3.\n"
  covers = ["c-1", "c-3"]
  test_contract = ["Goldens are minted ONCE under a PINNED sandbox so node's FS/env-derived output is reproducible: a fixture CLAUDE_CONFIG_DIR (staged todos/ with mtime-pinned <session>-agent-*.json, fixture .dross/state.json, fixture jobs/), a controlled workspace.current_dir, a stubbed git branch, CLAUDE_JOB_DIR, and CLAUDE_CODE_AUTO_COMPACT_WINDOW — then committed as testdata/*.golden; the test reads only committed bytes and NEVER invokes node. A `// generated by:` provenance comment records the EXACT sandbox env + node invocation, not just the command", "TestRender line 1: model+dir+branch -> exact dim-wrapped bytes incl the `⎇ ` branch segment; branch empty -> no suffix and no trailing space", "TestContextMeter boundary table at used% 49/50/64/65/79/80 asserts the exact SGR per band (32 / 33 / 38;5;208 / 5;31m💀) and the Math.floor(used/10) filled/empty cell count", "auto-compact normalization: CLAUDE_CODE_AUTO_COMPACT_WINDOW set vs default ~16.5% vs a total_tokens override each produce the JS-matching used%; remaining_percentage absent -> meter omitted entirely; total_tokens absent -> JS 1_000_000 default applied (A1)"]
  status = "done"

[[task]]
  id = "t-2"
  wave = 2
  title = "Line 2 todo/state composition + line-assembly edge cases"
  files = ["internal/statusline/render.go", "internal/statusline/render_test.go"]
  description = "Extend Render: Inputs gains TodoActiveForm + DrossState. Line 2 = in-progress todo\nactiveForm (bold) when present, else dross state \"milestone · phase · status\" (dim,\ngraceful when fields absent); todo wins. Reproduce the two byte-fragile JS behaviors:\nthe trailing \" │ \" strip and the context-bar leading-space strip when line2Body is\nempty (statusline.js ~lines 224-227).\n"
  covers = ["c-2"]
  depends_on = ["t-1"]
  test_contract = ["TestRenderLine2 golden cases: todo-present beats state (bold activeForm), state-only (dim m·p·s), neither -> line2 body empty; each crossed with meter-present and meter-absent", "the meter-absent + empty-line2Body case asserts NO stray leading space before the bar (exercises the leading-space strip)", "a state with a missing field renders gracefully (no `· ·` doubling / no panic), matching the JS golden bytes"]
  status = "done"

[[task]]
  id = "t-3"
  wave = 3
  title = "Peer-jobs render (line 3)"
  files = ["internal/statusline/render.go", "internal/statusline/render_test.go"]
  description = "Extend Render: Inputs gains Peers []Peer. Line 3 = \"<icon> <name> · <detail>\" per\npeer with the MDI nerd-font icon/color map, sorted review→blocked→working→done,\ndetail truncated to 40 chars; absent when no peers. Pure formatting only — the 6h\nstaleness + skip-own-job filtering lives in the gather layer (t-4).\n"
  covers = ["c-4"]
  depends_on = ["t-2"]
  test_contract = ["TestRenderPeers golden: peers fed out of state order render review→blocked→working→done; exact MDI codepoint bytes + ANSI color per state and the unknown-state fallback icon/color", "detail truncation pins the JS truncDetail shape (A3): first line only (split(\"\\n\")[0]), whitespace collapsed (/\\s+/g -> single space), then slice(0, n-1).trimEnd()+\"…\" so a >40-char multiline/whitespace detail yields the exact JS bytes (result may be <40 chars); the multi-peer join is exactly the JS separator", "zero peers -> line 3 absent (no trailing blank line)"]
  status = "done"

[[task]]
  id = "t-4"
  wave = 4
  title = "Gather layer: stdin + todos/state/jobs/git behind injected seams"
  files = ["internal/statusline/gather.go", "internal/statusline/gather_test.go"]
  description = "`Gather(stdin []byte, env func(string) string, now time.Time, gitBranch func(dir string) string) (Inputs, error)`:\nparse stdin JSON; resolve claudeDir from CLAUDE_CONFIG_DIR (else ~/.claude); pick the\nnewest-by-mtime <session>*-agent-*.json in-progress todo -> activeForm; walk up <=10\ndirs to .dross/state.json; read peer jobs (6h staleness filter, skip CLAUDE_JOB_DIR\nbasename). Env/clock/git are all injected (never os.Getenv / time.Now / exec directly)\nso every FS root and clock is hermetic — this seam is what makes the golden + command\ntests reproducible.\n"
  covers = ["c-2", "c-4", "c-5"]
  depends_on = ["t-2", "t-3"]
  test_contract = ["TestGather over temp dirs: CLAUDE_CONFIG_DIR override is read and the default ~/.claude is NOT consulted when it is set", "two matching todo files with os.Chtimes-pinned mtimes -> newest wins; todo present AND state present -> DrossState left empty (todo-wins re-asserted at gather)", "todo selection filter (A2): a file with the wrong session prefix, or without `-agent-`, or not ending `.json` is excluded even if newer — only startsWith(session)&&contains(\"-agent-\")&&.json candidates are considered", "input defaults (A1): model.display_name absent -> \"Claude\"; workspace.current_dir absent -> process cwd; peer name absent -> daemonShort/id fallback — each matches the JS default", ".dross/state.json two dirs above cwd is found by walk-up; the walk stops at the home boundary", "peer jobs: a state.json with now-7h -> excluded, now-5h -> kept, updatedAt omitted -> kept; the CLAUDE_JOB_DIR basename is skipped; unreadable/garbage state.json is skipped not fatal. now is a parameter so the 6h boundary is clock-free"]
  status = "done"

[[task]]
  id = "t-5"
  wave = 5
  title = "Cobra `dross statusline`: bounded stdin, silent-fail, register"
  files = ["internal/cmd/statusline.go", "internal/cmd/statusline_test.go", "cmd/dross/main.go"]
  description = "Thin wrapper mirroring update.go. Bare `dross statusline` reads stdin with a bounded\nread (timeout, matching the JS 3s/exit-0), supplies real os.Getenv + a real git\nsymbolic-ref→rev-parse runner, calls Gather→Render, writes stdout. NEVER returns a\nnon-nil error that would break the status line — parse/FS errors yield empty/partial\noutput and exit 0. Registered in main.go.\n"
  covers = ["c-5"]
  depends_on = ["t-4"]
  test_contract = ["TestStatusline drives an extracted run(stdin, out, env, now, git): malformed JSON -> empty/partial output, exit 0, no panic; empty stdin -> exit 0", "a stdin reader that never closes returns within the bounded deadline (assertion wrapped in its own time.After guard) and does not hang past it", "TestGitBranch exercises the REAL runner over a `git init` t.TempDir (finding #2): a normal branch -> its name (symbolic-ref --short, with --no-optional-locks); a detached HEAD -> the rev-parse --short SHA; a non-repo dir -> \"\" — so c-1's full fallback chain is covered, not just a stubbed branch", "one end-to-end byte-faithful golden using a fake `git` (stubbed branch) + the mtime-pinned todo fixture, proving Gather→Render wired through the command matches the committed golden", "the command is registered: `dross statusline` resolves (subcommand-guard / parity expectations updated)"]
  status = "done"

[[task]]
  id = "t-6"
  wave = 1
  title = "Pure settings.json merge/unmerge core"
  files = ["internal/statusline/settings.go", "internal/statusline/settings_test.go"]
  description = "Cobra-free, parallelizable with the render spine. `MergeStatusline(settings []byte,\nabsCmd string) ([]byte, error)` and `RemoveStatusline(settings []byte, absCmd string)\n([]byte, error)`: JSON-merge preserving every other key, idempotent, returns a\nrefuse-clobber sentinel error when a DIFFERENT existing statusLine.command is present,\nand removes only dross's own entry (no-op when dross didn't set it).\n"
  covers = ["c-6", "c-7"]
  test_contract = ["TestMergeStatusline hostile fixtures: missing/empty file -> creates settings with only statusLine; settings with unrelated keys -> all siblings byte-survive, only statusLine.command added", "re-merge of already-dross-wired settings -> idempotent (byte-stable); a DIFFERENT existing statusLine.command -> ErrStatusLineClobber sentinel, input bytes unchanged", "TestRemoveStatusline: removes only dross's entry preserving siblings; no statusLine present -> no-op byte-identical; a user's foreign statusLine.command -> left untouched", "round-trip Merge then Remove returns settings semantically equal to the pre-merge original"]
  status = "done"

[[task]]
  id = "t-7"
  wave = 6
  title = "Wire `install --statusline/--no-statusline` + `statusline enable|disable`"
  files = ["internal/cmd/install.go", "internal/cmd/statusline.go", "internal/cmd/install_statusline_test.go"]
  description = "End-to-end opt-in/revert over the t-6 core. install.go gains --statusline /\n--no-statusline flags with interactive consent (honoring the refuse-clobber sentinel)\nand resolves the ABSOLUTE installed-binary path via os.Executable/EvalSymlinks per the\ncommand_form decision, writing ~/.claude/settings.json atomically. statusline.go gains\nenable/disable subcommands over the same core.\n"
  covers = ["c-6", "c-7"]
  depends_on = ["t-5", "t-6"]
  test_contract = ["TestInstallStatusline against a temp HOME: --statusline writes statusLine.command = \"<abs>/dross statusline\" (assert ABSOLUTE path, not bare `dross`) and preserves a pre-seeded unrelated settings key", "second --statusline run is idempotent (settings byte-stable); a pre-seeded foreign statusLine refuses without consent and is overwritten only with consent", "--no-statusline / `dross statusline disable` removes only dross's entry, leaves an unrelated statusLine untouched, and is a no-op when dross never wired it"]
  status = "done"
