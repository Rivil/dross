[phase]
id        = "ship-architecture-autogen"
title     = "ship-architecture-autogen"
milestone = "v0.9"

[[criteria]]
id   = "c-1"
text = "When ARCHITECTURE.md is absent at repo root during dross ship's §3.5 step, the interactive ship flow automatically runs the backfill (generating the doc from a code+git scan via the /dross-architecture generation) BEFORE merging the phase's landmarks — an older repo self-heals on its next ship, with no manual /dross-architecture step required."

[[criteria]]
id   = "c-2"
text = "Under dross ship --auto (non-interactive), the auto-backfill is skipped — like the §3.5 landmark merge — with a documented note, because backfill is an interactive LLM-driven step a non-interactive run cannot perform."

[[criteria]]
id   = "c-3"
text = "The auto-backfill never blocks a ship: if it cannot run (tooling gap or generation failure), ship skips it with a note and continues, honoring the existing 'a missing doc must not block the ship' rule."

[[decisions]]
key    = "backfill_mechanism"
choice = "Backfill stays prompt/LLM-driven — Go provides only the skeleton + link checker; entry prose is generated by the existing /dross-architecture flow. ship.md §3.5 is rewritten so that when ARCHITECTURE.md is absent the ship agent RUNS that backfill flow inline automatically, instead of instructing a manual run or a skip."
why    = "There is no Go 'backfill engine' that writes entry prose (the code comment says so explicitly); automating self-heal therefore means the ship prompt orchestrates the existing backfill generation, not new Go code."
locked = true

[[decisions]]
key    = "auto_path_scope"
choice = "Auto-backfill applies to the interactive ship path only. dross ship --auto continues to skip §3.5 entirely (backfill included), with the skip documented."
why    = "--auto is non-interactive and cannot drive the LLM backfill generation; keeping it a documented skip is honest and preserves the script/loop use case."
locked = true

[[decisions]]
key    = "non_blocking"
choice = "If the backfill cannot run or fails, ship logs a one-line note and continues — never aborts the ship over a missing/ungenerated ARCHITECTURE.md."
why    = "Matches the existing rule that a missing doc must not block a ship; self-heal is best-effort, not a gate."
locked = true
