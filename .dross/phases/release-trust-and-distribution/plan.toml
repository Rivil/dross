[phase]
  id = "release-trust-and-distribution"

[[task]]
  id = "t-1"
  wave = 1
  title = "Signature-verification core in internal/update (minisign, embedded public key)"
  files = ["internal/update/signature.go", "internal/update/signature_test.go", "go.mod", "go.sum"]
  description = """
Add minisign signature verification to the pure update core. Introduce the maintained
minisign-format library aead.dev/minisign (go get it; it verifies both the legacy and
the HASHED signature variants — minisign 0.12 produces hashed .minisig, confirmed
locally). New file internal/update/signature.go:
  - const EmbeddedMinisignPublicKey = "RWRGVzaFqxFDZpeqfa4BbxCTnkoKCE2iyau5AB8C/aL+w10g41xlSbqi"
    (the base64 key line of the production minisign.pub, key id 664311AB85365746 — the
    trust anchor; safe to commit).
  - var TrustedMinisignKey = EmbeddedMinisignPublicKey  — an OVERRIDE SEAM (exported var,
    same pattern as ghCommand / PRMergedFunc elsewhere) so cmd-flow tests can swap in a
    throwaway public key.
  - sentinels ErrSignatureMismatch and ErrNoSignature (mirroring ErrChecksumMismatch).
  - func VerifySignature(signed, signature []byte, pubKeyText string) error:
      * if len(signature)==0 → ErrNoSignature (fail-closed on a missing .minisig).
      * PublicKey.UnmarshalText([]byte(pubKeyText)); minisign.Verify(pub, signed, signature).
      * false → ErrSignatureMismatch; true → nil.
Unit tests (signature_test.go) are fully self-contained via aead.dev/minisign.GenerateKey
+ Sign — NO external minisign binary, NO production private key: a fixture checksums.txt
signed by a generated test key verifies (nil); a tampered body, a signature from a DIFFERENT
generated key, and an empty/nil signature each return the right sentinel.
"""
  covers = ["c-2", "c-3"]
  test_contract = [
    "a checksums.txt signed by test key K, verified against K's public key → VerifySignature returns nil",
    "the same bytes verified against a DIFFERENT key's public key → ErrSignatureMismatch",
    "flipping one byte of the signed content (checksums.txt) → ErrSignatureMismatch",
    "an empty signature → ErrNoSignature (never a silent pass)",
  ]
  status = "todo"

[[task]]
  id = "t-2"
  wave = 2
  title = "Gate dross update on the signature before any checksum/extract/swap"
  files = ["internal/cmd/update.go", "internal/cmd/update_test.go"]
  description = """
In internal/cmd/update.go, between the checksums.txt download (~line 129) and
update.VerifyChecksum (~line 133), insert signature verification as the OUTER trust gate:
  - resolve rel.AssetURL(\"checksums.txt.minisig\"); if \"\" → refuse with ErrNoSignature
    (fail-closed: every release from this version on is signed).
  - client.Download it; update.VerifySignature(sums, sig, update.TrustedMinisignKey);
    on error → `return fmt.Errorf(\"refusing update: %w\", err)` BEFORE extractBinary /
    AtomicReplace — no binary is touched on a bad or missing signature.
  - only then proceed to the existing VerifyChecksum(tarball, ...) integrity check.
Extend internal/cmd/update_test.go: the httptest release now serves a checksums.txt.minisig
signed by a throwaway key (generated in-test via aead.dev/minisign), and the test overrides
update.TrustedMinisignKey to that key's public key (restore via t.Cleanup). Assert: valid
signature → update proceeds (existing happy-path assertions still hold); NO .minisig asset →
refuses, binary unchanged; a .minisig signed by a different key → refuses, binary unchanged.
Signature refusal must occur before the checksum stage (a tampered-checksums test still
refuses, now for the signature reason if unsigned).
"""
  covers = ["c-2", "c-3"]
  test_contract = [
    "valid signed checksums.txt.minisig + override key → update applies (binary swapped) exactly as before signing existed",
    "release with no checksums.txt.minisig asset → update refuses and leaves the target binary byte-for-byte unchanged",
    "checksums.txt.minisig signed by a non-trusted key → update refuses before extract/swap",
    "existing update_test happy-path and checksum-mismatch cases stay green once they serve a validly-signed .minisig",
  ]
  status = "todo"

[[task]]
  id = "t-3"
  wave = 3
  title = "Sign checksums.txt in the release pipeline (goreleaser + workflow), audit CI"
  files = [".goreleaser.yaml", ".github/workflows/release.yml"]
  description = """
Make the release pipeline emit checksums.txt.minisig.
.goreleaser.yaml: add a signs block —
  signs:
    - id: minisign
      cmd: minisign
      signature: \"${artifact}.minisig\"
      args: [\"-S\", \"-s\", \"{{ .Env.MINISIGN_KEY_FILE }}\", \"-x\", \"${signature}\", \"-m\", \"${artifact}\"]
      stdin: \"{{ .Env.MINISIGN_PASSWORD }}\"
      artifacts: checksum
(minisign 0.12 reads the password from stdin non-interactively — confirmed locally — so the
user's password-protected key works as-is.)
.github/workflows/release.yml: before the goreleaser step, add a step (guarded by the same
new_tag != '' condition) that writes the secret key to an EPHEMERAL file:
    printf '%s\\n' \"$MINISIGN_SECRET_KEY\" > \"$RUNNER_TEMP/minisign.key\"; chmod 600 it
  (env: MINISIGN_SECRET_KEY from secrets; never echoed, never in the repo tree). Add to the
  goreleaser step's env: MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }} and
  MINISIGN_KEY_FILE: ${{ runner.temp }}/minisign.key.
CI hygiene: no new `uses:` (nothing to SHA-pin), no @latest, permissions stay contents:write
(signing needs no more), MINISIGN_* correctly modeled as secrets. Audited against the
supply-chain hardening checklist in the same edit. This step is statically verified only
(a live signed release can't be exercised unattended); the signing MECHANICS are proven by
the local empirical minisign test and the Go verify tests in t-1/t-2.
"""
  covers = ["c-1"]
  test_contract = [
    "goreleaser config parses and the signs block targets artifacts: checksum, emitting ${artifact}.minisig",
    "the workflow writes the secret key only to $RUNNER_TEMP and passes MINISIGN_PASSWORD + key path to goreleaser via env",
    "no CI-hardening regression: no new unpinned action, no @latest, permissions unchanged, secrets used only for real secrets",
  ]
  status = "todo"
