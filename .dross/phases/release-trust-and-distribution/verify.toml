  ]
  notes = "YAML has no mutation adapter, so c-1 is pinned by two config-regression guards: the goreleaser signs block (cmd: minisign, artifacts: checksum, ${artifact}.minisig, key/password via env) and the release workflow's ephemeral-key materialization ($RUNNER_TEMP only, chmod 600, secrets-sourced) + env wiring. The signing MECHANICS were also proven empirically locally: minisign 0.12 signs checksums non-interactively with a stdin password and the signature verifies. A live signed release cannot be exercised unattended (documented scope limit); the consumer side is fully covered by c-2/c-3."

[[criterion]]
  id = "c-2"
  status = "covered"
  tests = [
    "internal/update/signature_test.go (VerifySignature: valid/wrong-key/tampered/empty)",
    "internal/cmd/update_test.go:TestUpdateRefusesOnMissingSignature",
    "internal/cmd/update_test.go:TestUpdateRefusesOnWrongKeySignature",
    "internal/cmd/update_test.go:TestUpdateRefusesOnBadChecksum",
  ]
  notes = "dross update verifies the minisign signature over checksums.txt against the embedded public key BEFORE trusting any hash or touching the binary. Missing .minisig → ErrNoSignature (fail-closed); wrong-key/tampered → ErrSignatureMismatch; both leave the target binary byte-for-byte unchanged and never run resync. The bad-checksum test now serves a VALID signature, proving the signature gate is the outer check and the checksum gate still bites inside it (asserted errors.Is ErrChecksumMismatch)."

[[criterion]]
  id = "c-3"
  status = "covered"
  tests = [
    "internal/update/signature_test.go (throwaway GenerateKey+Sign, no production key)",
    "internal/cmd/update_test.go:TestUpdateAppliesAndResyncs (valid signed .minisig → applies)",
    "internal/cmd/update_test.go:TestUpdateRefusesOnMissingSignature",
    "internal/cmd/update_test.go:TestUpdateRefusesOnWrongKeySignature",
  ]
  notes = "All signature tests are self-contained via aead.dev/minisign.GenerateKey+Sign — no external minisign binary and no production private key. A fixture checksums.txt signed by a throwaway key verifies and the update proceeds; a tampered body, a different-key signature, and an absent .minisig each refuse before any swap. Mutation: internal/update scored killed=25 / lived=0 / not_covered=0, efficacy 100% — every mutant in signature.go and the update.go gate was killed."

