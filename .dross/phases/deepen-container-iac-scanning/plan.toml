[phase]
id = "deepen-container-iac-scanning"

[[task]]
id    = "t-1"
wave  = 1
title = "Add content-matcher to marker engine"
files = [
  "internal/stack/profile.go",
  "internal/stack/detect.go",
  "internal/stack/profile_test.go",
  "internal/stack/detect_test.go",
]
description = """
Add `Signals.Content{All,Any []string}`. After a glob candidate matches, read the
file at a capped size (~64 KiB) and confirm case-sensitively — All=AND, Any=OR. A
profile with no [signals.content] keeps the pure-glob fast path (docker/terraform
unchanged). Engine carries no profile-id literal (TestNoDockerHardcode stays green).
"""
covers = ["c-1", "c-2"]
test_contract = [
  "if OR semantics are used where AND is required, TestContentMatchAllSemantics fails",
  "if matching becomes case-insensitive (lowercase `resources:` matches cfn `Resources`), TestContentMatchCaseSensitive fails",
  "if a glob-only profile starts reading file bodies, the pure-glob fast-path regression test fails",
  "if the read cap is removed, TestContentMatchReadCap (marker planted past the cap must NOT match) fails",
  "if a binary/unreadable candidate panics instead of being skipped, TestContentMatchUnreadableSkipped fails",
  "if content-sniff doesn't resolve end-to-end, TestMarkerContentSniffEmbedded (apiVersion+kind -> kubernetes; AWSTemplateFormatVersion -> cloudformation via Embedded()) fails",
]
status = "pending"

[[task]]
id    = "t-2"
wave  = 1
title = "Add dockle scan-path decision fn"
files = [
  "internal/security/dockle.go",
  "internal/security/dockle_test.go",
]
description = """
Pure decision function. image=="" -> Skipped with a non-empty Reason
("dockle needs a built image; run docker build or supply --image"), never all-clear.
dockle missing -> Skipped with the install hint (distinct from the no-image reason).
image set -> a run plan targeting the supplied ref; never emits `docker build`.
"""
covers = ["c-3", "c-8"]
test_contract = [
  "if the no-image case is not skipped-with-reason, TestDockleNoImageSkipsWithReason fails",
  "if a supplied-image plan shells out to build, TestDockleNeverBuilds (must reference the image, never contain \"build\") fails",
  "if a missing dockle binary is reported as a no-image skip instead of an install hint, TestDockleMissingBinHint fails",
]
status = "pending"

[[task]]
id    = "t-5"
wave  = 1
title = "Add checkov/dockle loadouts, flip guards"
files = [
  "internal/stack/profiles/terraform.toml",
  "internal/stack/profiles/docker.toml",
  "internal/stack/embed_test.go",
]
description = """
terraform.toml gains a "checkov" scanner (install hint names the Python toolchain,
e.g. "pipx install checkov"); docker.toml gains a "dockle" scanner. Both header
comments updated — checkov/dockle are no longer "out of scope". In the SAME commit,
flip the existing forbidding assertions in TestEmbeddedTerraform (embed_test.go:115-117)
and TestEmbeddedDocker (embed_test.go:52-54) to require the new tools — so t-5's own
commit passes go test (no deferred red-commit window).
"""
covers = ["c-3", "c-4"]
test_contract = [
  "if checkov is absent from terraform.toml, the flipped TestEmbeddedTerraform present-assertion fails",
  "if dockle is absent from docker.toml, the flipped TestEmbeddedDocker present-assertion fails",
  "if the assertions are added (checkov/dockle present) without the .toml change in the same commit, go test fails inside this task's own commit",
  "if the checkov install hint omits the Python toolchain, t-8's c-4 python-hint row fails",
]
status = "pending"

[[task]]
id         = "t-3"
wave       = 2
depends_on = ["t-1"]
title      = "Add kubernetes marker profile"
files = [
  "internal/stack/profiles/kubernetes.toml",
]
description = """
No exts; file_patterns *.yaml/*.yml/*.json; [signals.content].all = ["apiVersion","kind"].
Scanners "trivy config" (bin trivy) + "checkov" (Python hint). Analyzer "kube-linter"
(dimension error-handling). Header comment explains the marker + content-sniff stack.
"""
covers = ["c-1", "c-4", "c-7"]
test_contract = [
  "if apiVersion/kind is dropped from the content matcher, t-8's TestBuildManifestMarkerKubernetes fixture stops surfacing the profile",
  "if kube-linter's dimension is not error-handling, t-9's quality dimension row fails",
  "if checkov is dropped from the profile, t-8's checkov-present row for k8s empties",
]
status = "pending"

[[task]]
