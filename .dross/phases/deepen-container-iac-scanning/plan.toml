[[task]]
  id = "t-11"
  wave = 3
  title = "Commit multi-IaC fixture + run record"
  files = ["fixtures/iac-multi-c5/deployment.yaml", "fixtures/iac-multi-c5/template.yaml", "fixtures/iac-multi-c5/Dockerfile", "fixtures/iac-multi-c5/RUN.md", "fixtures/iac-multi-c5/expected-finding.txt"]
  description = "Mirror fixtures/terraform-c3. A k8s manifest, a CFN template, and a Dockerfile each\nplant a deterministic misconfig the agnostic fallback is blind to. RUN.md is a locked\nMANUAL-run record: after `make install`, `dross security detect` + `dross quality\ndetect` list every new tool (k8s+cfn trivy config, checkov, dockle, kube-linter,\ncfn-lint) as installed-vs-missing-with-hint, then each surfaces its finding while\ntrivy fs/gitleaks/scc/jscpd stay blind. Fixtures carry the exact content tokens\nt-1/t-3/t-4 sniff.\n"
  covers = ["c-5"]
  depends_on = ["t-3", "t-4", "t-5"]
  test_contract = ["if a planted misconfig is fixed, expected-finding.txt no longer matches the corresponding tool's finding in RUN.md", "if a k8s/cfn content token is removed from the fixture, the fixture stops surfacing its profile and RUN.md stops reproducing"]
