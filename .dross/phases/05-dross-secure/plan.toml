[phase]
  id = "05-dross-secure"

[[task]]
  id = "t-1"
  wave = 1
  title = "Run-dir + collision-safe run-id"
  files = ["internal/security/run.go", "internal/security/run_test.go"]
  description = "NewRun creates .dross/security/<run>/ with run-id = <timestamp>-<short-sha>.\nSame-commit second run gets a unique suffix; no git → \"nogit\" fallback.\n"
  covers = ["c-1", "c-6"]
  test_contract = ["if RunID(ts, sha) doesn't return \"<timestamp>-<short-sha>\", TestRunID fails", "if a second run on the same commit clobbers the first dir instead of getting a unique suffix, the collision test fails", "TestNewRunWriteBoundary enumerates every path NewRun touched and fails if any falls outside .dross/security/<run>/ (a real path-set check, not a never-triggered negative)", "if the short-sha can't be read (no git / detached HEAD) and it errors instead of falling back to \"nogit\", the fallback test fails"]
  status = "done"

[[task]]
  id = "t-2"
  wave = 1
  title = "Scanner catalog + availability detection"
  files = ["internal/security/catalog.go", "internal/security/catalog_test.go"]
  description = "Data-driven language→scanner catalog (Go-complete + agnostic gitleaks/semgrep/\ntrivy; other langs stub). Detection partitions catalog into installed vs missing.\n"
  covers = ["c-4"]
  test_contract = ["if a core scanner (govulncheck, gosec, gitleaks, semgrep, trivy) is dropped from the catalog, the catalog-completeness test fails", "if a missing scanner is reported without its install instruction, TestAvailabilityMissingHasHint fails", "if a non-Go language yields zero applicable agnostic tools instead of the gitleaks/semgrep/trivy set, the agnostic-fallback test fails"]
  status = "done"

[[task]]
  id = "t-3"
  wave = 1
  title = "Findings ledger schema + malformed-input guard"
  files = ["internal/security/findings.go", "internal/security/findings_test.go"]
  description = "findings.toml ledger: each finding carries an id, contextual severity, and\nrefutation evidence. Load returns an error (never panics) on garbled input.\n"
  covers = ["c-1", "c-2"]
  test_contract = ["if a finding with an empty / out-of-range severity is accepted, the severity-validation test fails", "if a finding lacking refutation evidence is treated as survived, the unrefuted-dropped test fails", "if Load on a truncated/garbled findings.toml panics instead of returning an error, the malformed-ledger test fails", "if a finding's severity + refutation fields don't round-trip through save/load, the round-trip test fails"]
  status = "done"

[[task]]
  id = "t-9"
  wave = 1
  title = "Gitignore the security run artifacts"
  files = [".gitignore"]
  description = "Add .dross/security/ to .gitignore so raw findings never land in the public repo.\n"
  covers = ["c-6"]
  test_contract = ["if .gitignore doesn't ignore .dross/security/, TestSecurityArtifactsGitignored fails — it shells `git check-ignore .dross/security/x/report.md` and asserts the path is ignored (behavioural, not a string-match on the line)"]
  status = "done"

[[task]]
  id = "t-7"
  wave = 1
  title = "Author secure.md + dross-secure.md prompts"
  files = ["assets/prompts/secure.md", "assets/commands/dross-secure.md"]
  description = "The orchestration prompt (recon → tooling sweep → fan-out audit → refute-panel →\nsynthesize → propose scaffold) plus its command shim. Context-free, read-only.\n"
  covers = ["c-2", "c-3", "c-5", "c-6"]
  test_contract = ["if the command/prompt pair is broken (one of the two missing), TestCommandsPromptsParity fails", "the four mandated secure.md sections (refute-panel majority-vote drop, \"read no .dross/ planning artifacts\", \"no --fix / never edit or commit app code\", \"propose-then-ask before locking the scaffold\") are authored here and content-gated by t-8's secure_prompt_test.go — explicit delegation: t-7 authors, t-8 asserts"]
  status = "done"

[[task]]
  id = "t-4"
  wave = 2
  title = "Language detection + tool-coverage manifest"
  files = ["internal/security/recon.go", "internal/security/recon_test.go"]
  description = "Walk the target tree, detect languages, map to the catalog, and emit a\ntool-coverage manifest (ran vs skipped). The executable guard that the audit\nstays context-free.\n"
  covers = ["c-3", "c-4"]
  depends_on = ["t-2"]
  test_contract = ["if detection reads any .dross/ planning file (a planted .dross/ fixture must be ignored), the context-free test fails", "if the coverage manifest omits a detected-but-uninstalled scanner (records only ran tools), the manifest-completeness test fails", "if an unknown file extension crashes detection instead of being ignored, the unknown-ext test fails"]
  status = "done"

[[task]]
  id = "t-8"
  wave = 2
  title = "Content-assertion harness for secure prompt"
  files = ["internal/cmd/secure_prompt_test.go"]
  description = "A dedicated test file (not appended to commands_parity_test.go) where each\nmandated secure.md section is an individually-failing sub-assertion.\n"
  covers = ["c-2", "c-3", "c-5", "c-6"]
  depends_on = ["t-7"]
  test_contract = ["if secure.md omits the refute-panel + majority-vote drop rule, its c-2 sub-assertion fails", "if secure.md omits the \"read no .dross/ planning artifacts\" directive, its c-3 sub-assertion fails", "if secure.md omits \"no --fix / never edit or commit app code\", its c-6 sub-assertion fails", "if secure.md omits \"propose-then-ask before locking the scaffold\", its c-5 sub-assertion fails"]
  status = "done"

[[task]]
  id = "t-5"
  wave = 3
  title = "Findings→spec.toml scaffold writer"
  files = ["internal/security/scaffold.go", "internal/security/scaffold_test.go"]
  description = "Emit a pre-filled spec.toml from the surviving-findings ledger: one criterion per\nfinding, criticals-first, each criterion citing its ledger id. Refuses to write a\nvacuous phase when there are zero findings.\n"
  covers = ["c-5", "c-1"]
  depends_on = ["t-1", "t-2", "t-3", "t-4"]
  test_contract = ["if the emitted spec.toml fails to round-trip through phase.LoadSpec, the valid-spec test fails", "if two findings collapse into one criterion (not one-per-finding), TestScaffoldOnePerFinding fails", "if criteria/waves aren't emitted criticals-first (a low-then-critical ledger still yields critical-first), TestScaffoldSeverityOrder fails", "if a criterion's text omits its findings.toml ledger id, TestScaffoldCriterionCitesLedger fails", "if the writer emits with zero surviving findings instead of refusing, the empty-scaffold guard test fails"]
  status = "done"

[[task]]
  id = "t-6"
  wave = 3
  title = "Wire dross security subcommand"
  files = ["internal/cmd/security.go", "internal/cmd/security_test.go", "cmd/dross/main.go"]
  description = "Cobra `dross security` with detect / run / scaffold subcommands, each calling its\nwave-1/2 library surface. Read-only: never writes outside .dross/security/.\n"
  covers = ["c-1", "c-4", "c-6"]
  depends_on = ["t-1", "t-2", "t-3", "t-4"]
  test_contract = ["if `dross security` isn't registered on the root command, the subcommand-parity test fails", "if `detect` doesn't print installed-vs-missing scanners, TestSecurityDetectOutput fails", "if `run` doesn't create the dir under .dross/security/, TestSecurityRunCreatesDir fails", "TestSecurityRunReadOnly runs against a fixture and asserts the run touches only paths under .dross/security/<run>/; a finding whose path resolves to ../main.go must be refused, not written outside the run dir", "if a run with no available scanners hard-errors instead of proceeding with partial coverage + manifest, the partial-coverage test fails"]
  status = "done"
