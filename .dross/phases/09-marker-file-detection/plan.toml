[phase]
  id = "09-marker-file-detection"

[[task]]
  id = "t-1"
  wave = 1
  title = "Add file_patterns field + glob matcher"
  files = ["internal/stack/profile.go", "internal/stack/profile_test.go"]
  description = "Add Signals.FilePatterns []string (toml key file_patterns) to the Profile schema\nand a pure matcher (Signals helper) that lowercases BOTH filename and pattern\nbefore filepath.Match — case-insensitive glob, NOT regex, no brace expansion.\nExisting exact-match Signals.Files is left untouched (marker_pattern_syntax decision).\n"
  covers = ["c-4", "c-5"]
  test_contract = ["TestFilePatternMatch table: Dockerfile, Dockerfile.dev, app.Dockerfile, app.dockerfile, docker-compose-prod.yaml, compose.override.yml, compose.yaml MUST match docker's patterns; notes.txt, README.md, mydockerfile.go, compose.go MUST NOT — if the glob is over-broad (e.g. *dockerfile* substring) the negative rows fail", "because there is no brace expansion, .yml and .yaml are separate patterns: a row asserting compose.yaml does NOT match a *.yml-only pattern fails if someone collapses them", "Decode round-trips [signals].file_patterns into Signals.FilePatterns; if the toml tag is wrong the decode-assertion fails"]
  status = "done"

[[task]]
  id = "t-2"
  wave = 1
  title = "Add generic MarkerProfiles detector"
  files = ["internal/stack/detect.go", "internal/stack/detect_test.go"]
  description = "New exported MarkerProfiles(root string, profiles []*Profile) []string returning the\nsorted set of profile ids whose FilePatterns match, using t-1's matcher. Walks the\nsubtree reusing the existing skipDirs/WalkDir pattern (as extsInTree/DetectLanguages do)\nso subdir markers like sub/Dockerfile.dev are caught. Touches NEITHER Detect NOR\nDetectLanguages — additive-only seam (marker_detection_additive decision).\n"
  covers = ["c-1", "c-5", "c-6"]
  depends_on = ["t-1"]
  test_contract = ["TestMarkerProfiles: a tmp tree with only a Dockerfile, against Embedded(), includes \"docker\" (c-1)", "a synthetic in-memory profile {id:\"widget\", FilePatterns:[\"*.widget\"]} over an x.widget tree returns \"widget\" — proving no docker hardcode, the c-5 keystone; removing the data-driven match and special-casing docker fails this row", "a subdir-only marker (services/api/Dockerfile) is still detected, proving the subtree walk; a root-only scan fails this row", "a tmp tree with only main.go returns EMPTY — no spurious docker (c-6)"]
  status = "done"

[[task]]
  id = "t-3"
  wave = 1
  title = "Ship embedded docker stack profile"
  files = ["internal/stack/profiles/docker.toml", "internal/stack/embed_test.go"]
  description = "New docker.toml: id=\"docker\", [signals].file_patterns covering the c-4 families\n(Dockerfile, Dockerfile.*, *.dockerfile, docker-compose*.yml/.yaml, compose*.yml/.yaml)\nand NO exts. Tools = hadolint (kind=scanner) + hadolint (kind=analyzer,\ndimension=\"error-handling\") + trivy config (kind=scanner), matching the locked\ndocker_tool_loadout. The hadolint analyzer's dimension MUST be in the substantive\nallowlist or the existing quality TestCatalogExcludesCosmetic guard goes red the\nmoment docker.toml embeds. The trivy scanner's Name must be distinct from the\nagnostic \"trivy\" scanner. No dockle/checkov.\n"
  covers = ["c-1", "c-7"]
  test_contract = ["TestEmbeddedDocker: Embedded() includes the docker profile; ByID(docker) carries the FilePatterns and exactly the hadolint-scanner / hadolint-analyzer / trivy-config-scanner loadout", "if dockle or checkov appears, or hadolint is missing either kind, the tool assertion fails", "the hadolint analyzer's dimension is in the substantive allowlist (error-handling); the existing internal/quality/catalog_test.go:TestCatalogExcludesCosmetic stays green after docker.toml embeds — an empty/non-allowlisted dimension trips it", "malformed docker.toml surfaces as an Embedded() load error"]
  status = "done"

[[task]]
  id = "t-4"
  wave = 2
  title = "Union marker profiles into security manifest"
  files = ["internal/security/recon.go", "internal/security/recon_test.go"]
  description = "After the existing language loop, BuildManifest calls stack.MarkerProfiles(root, LoadAll())\nand add(ScannersFor(id)) per matched marker id — additive, deduped via the existing seen\nset, Languages list unchanged.\n"
  covers = ["c-2", "c-6"]
  depends_on = ["t-2", "t-3"]
  test_contract = ["TestBuildManifestMarkerDocker: BuildManifest on a tmp tree with only a Dockerfile yields tool names containing both \"hadolint\" and \"trivy config\" (c-2) — the manifest-path blind spot is closed", "TestBuildManifestNoMarkerRegression: a tmp tree with only main.go yields the Go + agnostic set with NO hadolint/trivy config (c-6)", "a Go-repo-with-Dockerfile surfaces no duplicated scanner entry — the dedup via seen holds", "the docker scanner surfaces under its own distinct name (\"trivy config\"), NOT collapsed into the agnostic \"trivy\" by the seen dedup — if the docker profile reused the bare name \"trivy\" the entry would be deduped away and this c-2 assertion fails"]
  status = "done"

[[task]]
  id = "t-5"
  wave = 2
  title = "Union marker profiles into quality manifest"
  files = ["internal/quality/recon.go", "internal/quality/recon_test.go"]
  description = "Mirror of t-4 in the quality recon: MarkerProfiles + AnalyzersFor, additive and deduped,\nLanguages unchanged.\n"
  covers = ["c-3", "c-6"]
  depends_on = ["t-2", "t-3"]
  test_contract = ["TestQualityManifestMarkerDocker: a tmp tree with only a Dockerfile yields tool names containing \"hadolint\" (kind=analyzer) ON TOP of the agnostic scc/jscpd set — the agnostic set must still be present (a marker-only repo never loses scc/jscpd)", "TestQualityNoMarkerRegression: a tmp tree with only main.go yields no hadolint (c-6)"]
  status = "done"

[[task]]
  id = "t-6"
  wave = 3
  title = "Guard: no Docker hardcode in detect/recon"
  files = ["internal/stack/detect_test.go"]
  description = "TestNoDockerHardcode reads the detect.go + security/recon.go + quality/recon.go source\nand fails on any literal \"docker\"/\"Dockerfile\", proving marker detection is purely\ndata-driven (mirrors the existing TestNoDuplicateExtLangMap idiom). Runs against the\npost-edit recon files, hence wave 3.\n"
  covers = ["c-5"]
  depends_on = ["t-2", "t-4", "t-5"]
  test_contract = ["TestNoDockerHardcode fails if any of detect.go / security recon.go / quality recon.go contains a literal \"docker\" or \"Dockerfile\" string — a special-case slipped into the mechanism code trips it"]
  status = "done"

[[task]]
  id = "t-7"
  wave = 2
  title = "Verify docker profile on stack CLI"
  files = ["internal/cmd/stack_test.go"]
  description = "Test-only: list/show are already generic over LoadAll(). TestStackListIncludesDocker\nasserts `dross stack list` stdout contains docker; TestStackShowDocker asserts\n`dross stack show docker` returns nil error and its encoded TOML contains file_patterns\nand hadolint.\n"
  covers = ["c-7"]
  depends_on = ["t-3"]
  test_contract = ["TestStackListIncludesDocker: stack list stdout contains \"docker\"; fails if docker.toml fails to embed", "TestStackShowDocker: stack show docker returns nil error and the encoded output contains \"file_patterns\" and \"hadolint\"; fails if file_patterns doesn't encode"]
  status = "done"
