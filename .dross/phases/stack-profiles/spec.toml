[phase]
  id = "stack-profiles"
  title = "stack-profiles"
  milestone = "v0.1"

[[criteria]]
  id = "c-1"
  text = "Stack detection identifies the repo's stack from signals (go.mod, etc.), not hardcoded to Go; it matches Go for this repo and returns a clear 'unsupported stack' result for a non-Go fixture instead of assuming Go."

[[criteria]]
  id = "c-2"
  text = "The Go profile is the single source for the runtime command set (test/typecheck/format/build); init and onboard populate project.toml [runtime] from it rather than hardcoded guesses."

[[criteria]]
  id = "c-3"
  text = "The Go profile declares the tool loadout that dross-secure (scanners) and dross-quality (analyzers) consume, replacing their inline language->tool maps."

[[criteria]]
  id = "c-4"
  text = "A 'dross stack loadout' command emits an agent loadout (recommended MCP tools, guardrails, locked conventions) derived from stack.locked, as a markdown block prompts can inject inline."

[[criteria]]
  id = "c-5"
  text = "Adding a new stack is a single declarative profile entry with zero mechanism-code changes, documented, and proven by a test/fixture where a second non-Go profile loads and is selected by detection."

[[decisions]]
  key = "scope_go_first"
  choice = "Deliver the profile mechanism plus the Go profile only; extensibility (adding a stack with no code change) is a first-class, tested requirement."
  why = "Milestone v0.1 non-goal is Go-first; the value of this phase is making the next-framework work cheap, so extensibility is the keystone, not Go breadth."
  locked = true

[[decisions]]
  key = "unify_operational_and_loadout"
  choice = "A stack profile is one declarative bundle per stack supplying both operational tuning (runtime commands + scanner/analyzer catalogs) and the agent loadout (MCP tools, conventions, guardrails)."
  why = "Resolves the milestone ('tune runtime/commands') vs Workstream E ('generate an agent loadout') tension by building one thing instead of two."
  locked = true

[[decisions]]
  key = "schema_extensibility"
  choice = "The declarative profile schema supports package-manager variants, multiple commands per slot, optional/availability-gated tools, and per-OS tool names."
  why = "Other ecosystems need these shapes; baking them in now means next-phase language profiles slot in without reshaping the schema."
  locked = true

[[decisions]]
  key = "profile_home"
  choice = "Built-in profiles compiled in via go:embed; dross also reads ~/.claude/dross/profiles/*.toml and merges with the user dir winning."
  why = "Honors the locked 'single static binary' (self-contained, works out of the box) while giving true drop-in: a new framework is a TOML in the user dir or an added embedded file."
  locked = true

[[decisions]]
  key = "command_surface"
  choice = "New top-level verb 'dross stack' with subcommands detect / show / list / apply / loadout; concept named 'stack profile'; matched id stored in project.toml [stack].profile."
  why = "Avoids collision with the existing 'dross profile' (the behavioural profile) and keeps the two unrelated concepts in separate namespaces."
  locked = true

[[decisions]]
  key = "config_integration"
  choice = "Write-through: init/onboard seed project.toml [runtime] from the profile (user owns it after), and 'dross stack apply' re-syncs on demand. Tool catalogs and the agent loadout are read live from the profile, not copied into config."
  why = "Predictable and self-describing config the user owns, while still upgradeable when the profile improves; live reads avoid duplicating tool/loadout data into project.toml."
  locked = true

[[decisions]]
  key = "agent_loadout_shape"
  choice = "'dross stack loadout' emits the loadout as a markdown block that existing prompts inject inline; no generated Claude Code agent .md files."
  why = "Fits the locked 'CLI provides state, markdown prompts orchestrate' idiom and avoids a generated-file artifact dross would have to own and refresh."
  locked = true

[[deferred]]
  text = "Other-language stack profiles (Node, Python, etc.)"
  why = "This phase delivers the mechanism + Go; populating further frameworks is the next-phase drop-in work the extensibility keystone enables."

[[deferred]]
  text = "Generating standalone Claude Code agent .md definition files from a profile"
  why = "Rejected c-4 shape; the loadout ships as a 'dross stack loadout' text block instead of a maintained agent-file artifact."
  dismissed = true

[[deferred]]
  text = "Broad multi-language profile library shipped in v0.1"
  why = "Milestone non-goal; the mechanism is built to accept many stacks, but only Go ships now."
