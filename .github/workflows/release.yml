name: release

# Automatic releasing: every merge to main reads the project version from
# .dross/state.json and projects it to a 3-part semver tag (0.6.13.0 → v0.6.13 —
# valid semver for `dross update`, dropping the dev-only .internal part). If that
# tag does not already exist it tags the commit and goreleaser publishes the
# per-platform archives + checksums.txt that install.sh and `dross update` consume.
# A phase ship bumps the patch (phase ordinal) so it cuts a release; a quick task
# only bumps .internal, leaving the 3-part tag unchanged, so it cuts none.
# workflow_dispatch with an explicit `version` is the manual override.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit release tag, e.g. v0.6.0 (blank = auto-compute)'
        required: false
        default: ''

# Least privilege: only the release flow needs write (push the tag + create the
# GitHub release). No other permission is granted.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Pin proxy + checksum DB. NOT -mod=readonly: goreleaser's `go mod tidy`
      # before-hook needs a writable module graph.
      GOPROXY: https://proxy.golang.org,direct
      GOSUMDB: sum.golang.org
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history + tags for version computation

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            echo "Manual release: $input"
            echo "new_tag=$input" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          proj="$(jq -r '.version // empty' .dross/state.json)"
          if [ -z "$proj" ]; then
            echo "No project version in .dross/state.json; nothing to release." >&2
            exit 1
          fi
          # Project version is 4-part major.minor.patch.internal; release tags use
          # the first 3 parts (valid semver, drops the dev-only .internal counter).
          mmp="$(printf '%s' "$proj" | cut -d. -f1-3)"
          new="v${mmp}"
          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "Tag $new already exists (project version $proj unchanged on this merge); nothing to release."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Release tag from project version $proj → $new"
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.new_tag }}"
          git tag "$tag"
          git push origin "$tag"

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        if: steps.tag.outputs.new_tag != ''
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf  # v6.1.0
        if: steps.tag.outputs.new_tag != ''
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
