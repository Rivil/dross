name: release

# Automatic releasing: every merge to main computes the next semver tag from the
# conventional commits since the last tag (feat → minor, BREAKING → major, else
# patch — always at least a patch, so every merge cuts a release), tags it, and
# goreleaser publishes the per-platform archives + checksums.txt that install.sh
# and `dross update` consume. workflow_dispatch with an explicit `version` is the
# manual escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit release tag, e.g. v0.6.0 (blank = auto-compute)'
        required: false
        default: ''

# Least privilege: only the release flow needs write (push the tag + create the
# GitHub release). No other permission is granted.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Pin proxy + checksum DB. NOT -mod=readonly: goreleaser's `go mod tidy`
      # before-hook needs a writable module graph.
      GOPROXY: https://proxy.golang.org,direct
      GOSUMDB: sum.golang.org
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history + tags for version computation

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            echo "Manual release: $input"
            echo "new_tag=$input" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "HEAD is already tagged ($(git describe --tags HEAD)); nothing to release."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          if git rev-parse "$last" >/dev/null 2>&1; then
            range="$last..HEAD"
          else
            range="HEAD"
          fi
          log="$(git log "$range" --format='%B')"
          ver="${last#v}"
          major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"
          if printf '%s' "$log" | grep -qE 'BREAKING CHANGE|^[[:space:]*]*[a-z]+(\([^)]*\))?!:'; then
            major=$((major+1)); minor=0; patch=0
          elif printf '%s' "$log" | grep -qE '^[[:space:]*]*feat(\([^)]*\))?:'; then
            minor=$((minor+1)); patch=0
          else
            patch=$((patch+1))
          fi
          new="v${major}.${minor}.${patch}"
          echo "Computed next tag: $new (from $last)"
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.new_tag }}"
          git tag "$tag"
          git push origin "$tag"

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        if: steps.tag.outputs.new_tag != ''
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf  # v6.1.0
        if: steps.tag.outputs.new_tag != ''
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
