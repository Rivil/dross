# TypeScript stack profile. Drop a sibling <id>.toml into ~/.claude/dross/
# profiles/ to add or override a stack — no recompile, zero code change.
#
# Ships as a peer of svelte so .ts files get a dedicated analyzer: audit recon
# (quality.BuildManifest) calls AnalyzersFor per detected language keyed on
# profile id == language token, and extLang maps .ts/.tsx -> typescript.

id    = "typescript"
title = "TypeScript"

[signals]
  files    = ["tsconfig.json"]
  exts     = [".ts", ".tsx"]
  priority = 4

[[package_managers]]
  name     = "pnpm"
  bin      = "pnpm"
  lockfile = "pnpm-lock.yaml"
[[package_managers]]
  name     = "npm"
  bin      = "npm"
  lockfile = "package-lock.json"
[[package_managers]]
  name     = "yarn"
  bin      = "yarn"
  lockfile = "yarn.lock"

# Runtime command set seeded into project.toml [runtime] at init/onboard.
[runtime.test]
  run = "vitest run"
[runtime.typecheck]
  run = "tsc --noEmit"
[runtime.format]
  run = "prettier --check ."
[runtime.build]
  run = "tsc -b"

# Dedicated quality analyzer. Agnostic tools (gitleaks, semgrep, trivy, scc,
# jscpd) apply to every stack and are intentionally NOT listed here.
[[tools]]
  name      = "eslint"
  kind      = "analyzer"
  dimension = "complexity"
  core      = true
  install   = "npm i -D eslint typescript-eslint"

# Dedicated security scanners. Agnostic gitleaks/semgrep/trivy stay in the
# security catalog and are intentionally NOT listed here.
[[tools]]
  name    = "osv-scanner"
  kind    = "scanner"
  core    = true
  install = "go install github.com/google/osv-scanner/cmd/osv-scanner@latest"
[[tools]]
  name    = "eslint-plugin-security"
  bin     = "eslint"
  kind    = "scanner"
  install = "npm i -D eslint eslint-plugin-security"
[[tools]]
  name     = "retire.js"
  bin      = "retire"
  kind     = "scanner"
  optional = true
  install  = "npm i -g retire"

# Dedicated quality analyzers across the substantive dimensions the agnostic
# scc/jscpd set does not cover (eslint complexity stays above).
[[tools]]
  name      = "knip"
  kind      = "analyzer"
  dimension = "dead-code"
  core      = true
  install   = "npm i -D knip"
[[tools]]
  name      = "dependency-cruiser"
  bin       = "depcruise"
  kind      = "analyzer"
  dimension = "coupling"
  install   = "npm i -D dependency-cruiser"
[[tools]]
  name      = "typescript-eslint"
  bin       = "eslint"
  kind      = "analyzer"
  dimension = "error-handling"
  install   = "npm i -D eslint typescript-eslint"

[loadout]
  mcp_tools = [
    "context7 (resolve-library-id + query-docs) — verify TypeScript / library API signatures before calling them",
  ]
  guardrails = [
    "Prefer strict mode; avoid `any` (use `unknown` + narrowing); let inference work but annotate public APIs.",
    "Run `tsc --noEmit` and the vitest suite before claiming a change works.",
  ]
  conventions = [
    "ESM modules; discriminated unions over enums where it reads cleaner; type-only imports with `import type`.",
  ]
