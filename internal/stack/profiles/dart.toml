# Dart stack profile. Drop a sibling <id>.toml into ~/.claude/dross/profiles/
# to add or override a stack — no recompile, zero code change. See README.md.

id    = "dart"
title = "Dart"

[signals]
  files    = ["pubspec.yaml"]
  exts     = [".dart"]
  priority = 5

[[package_managers]]
  name     = "pub"
  bin      = "dart"
  lockfile = "pubspec.lock"

# Runtime command set seeded into project.toml [runtime] at init/onboard.
[runtime.test]
  run = "dart test"
[runtime.typecheck]
  run = "dart analyze"
[runtime.format]
  run = "dart format --output=none --set-exit-if-changed ."
[runtime.build]
  run = "dart compile exe bin/main.dart"

# Dedicated quality analyzer. Agnostic tools (gitleaks, semgrep, trivy, scc,
# jscpd) apply to every stack and are intentionally NOT listed here.
[[tools]]
  name      = "dcm"
  kind      = "analyzer"
  dimension = "complexity"
  core      = true
  install   = "see dcm.dev  (dart pub global activate dart_code_metrics for the OSS edition)"

# Dedicated security scanner. Dart has no strong dedicated SAST; osv-scanner
# scans pubspec.lock for known-vuln packages — optional, not core. Agnostic
# gitleaks/semgrep/trivy stay in the security catalog.
[[tools]]
  name     = "osv-scanner"
  kind     = "scanner"
  optional = true
  install  = "go install github.com/google/osv-scanner/cmd/osv-scanner@latest"

# Two more analyzer dimensions on top of dcm(complexity). Distinct Names so the
# manifest dedup (by Name) keeps both — same dcm binary, different invocation.
[[tools]]
  name      = "dcm-unused-code"
  bin       = "dcm"
  kind      = "analyzer"
  dimension = "dead-code"
  install   = "see dcm.dev  (dart pub global activate dart_code_metrics for the OSS edition)"
[[tools]]
  name      = "dart-analyze"
  bin       = "dart"
  kind      = "analyzer"
  dimension = "error-handling"
  install   = "bundled with the Dart SDK (dart.dev/get-dart)"

[loadout]
  mcp_tools = [
    "context7 (resolve-library-id + query-docs) — verify Dart / Flutter / package API signatures before calling them",
  ]
  guardrails = [
    "Honour null-safety; prefer final and const; avoid dynamic unless unavoidable.",
    "Run `dart analyze` and `dart test` before claiming a change works.",
  ]
  conventions = [
    "Effective Dart style; async/await over raw Futures; lints via analysis_options.yaml.",
  ]
